name: Android Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/jebkhata-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/jebkhata-release.jks" >> "$GITHUB_ENV"

      - name: Validate Signing Secrets
        run: |
          test -n "$ANDROID_KEYSTORE_PATH" || (echo "ANDROID_KEYSTORE_PATH missing" && exit 1)
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "ANDROID_KEYSTORE_PASSWORD missing" && exit 1)
          test -n "$ANDROID_KEY_ALIAS" || (echo "ANDROID_KEY_ALIAS missing" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD" || (echo "ANDROID_KEY_PASSWORD missing" && exit 1)

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Prepare Signed Release APK
        run: |
          mkdir -p dist
          if [ ! -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "Signed APK not found at app/build/outputs/apk/release/app-release.apk"
            exit 1
          fi
          cp app/build/outputs/apk/release/app-release.apk dist/jebkhata-${{ github.ref_name }}.apk

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jebkhata-release-apk
          path: dist

      - name: Create/Update Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jebkhata-${{ github.ref_name }}.apk
